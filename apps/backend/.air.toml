# air config — Go live-reload inside the dev container.
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/relaxd ./cmd/relaxd"
entrypoint = "./tmp/relaxd"
include_ext = ["go"]
exclude_dir = ["tmp", "gen/.cache"]
exclude_regex = ["_test\\.go$"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
