version: v2
clean: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: apps/backend/gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: apps/backend/gen
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es:v2.2.5
    out: packages/types/src/gen
    opt:
      - target=ts
      - import_extension=js
