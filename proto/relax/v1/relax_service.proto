syntax = "proto3";

package relax.v1;

import "relax/v1/media.proto";
import "relax/v1/streams.proto";
import "relax/v1/torrent.proto";
import "relax/v1/watch_progress.proto";
import "relax/v1/watchlist.proto";

option go_package = "relax/gen/relax/v1;relaxv1";

message SearchRequest {
  string query = 1;
  int32 page_size = 2;
  int32 page = 3;
}

message SearchResponse {
  repeated SearchResult results = 1;
  int32 total = 2;
}

message AddTorrentRequest {
  string magnet_uri = 1;
  string media_id = 2;
}

message AddTorrentResponse {
  Torrent torrent = 1;
}

message RemoveTorrentRequest {
  string torrent_id = 1;
}

message RemoveTorrentResponse {
  bool removed = 1;
}

message GetMetadataRequest {
  string tmdb_id = 1;
}

message GetMetadataResponse {
  MediaMetadata metadata = 1;
}

message UpsertWatchProgressRequest {
  WatchProgress progress = 1;
}

message UpsertWatchProgressResponse {}

message GetWatchProgressRequest {
  string media_id = 1;
  MediaType media_type = 2;
  int32 season = 3;
  int32 episode = 4;
}

message GetWatchProgressResponse {
  WatchProgress progress = 1;
  bool found = 2;
}

message GetWatchHistoryRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetWatchHistoryResponse {
  repeated WatchProgress items = 1;
  int32 total_count = 2;
}

message DeleteWatchProgressRequest {
  string media_id = 1;
  MediaType media_type = 2;
  int32 season = 3;
  int32 episode = 4;
}

message DeleteWatchProgressResponse {}

message ClearWatchHistoryRequest {}
message ClearWatchHistoryResponse {}

message StreamTorrentProgressRequest {
  string torrent_id = 1;
}

message TorrentProgressUpdate {
  Torrent torrent = 1;
}

message GetHomeSectionsRequest {}

message GetHomeSectionsResponse {
  repeated HomeSection sections = 1;
  MediaDetail featured = 2;
}

message SearchMediaRequest {
  string query = 1;
  MediaType media_type = 2;
  int32 page = 3;
}

message SearchMediaResponse {
  repeated MediaSummary results = 1;
  int32 page = 2;
  int32 total_pages = 3;
  int32 total_results = 4;
}

message GetMediaDetailRequest {
  int32 tmdb_id = 1;
  MediaType media_type = 2;
}

message GetMediaDetailResponse {
  MediaDetail detail = 1;
}

message BrowseMediaRequest {
  MediaType media_type = 1;
  bool anime = 2;
  int32 page = 3;
}

message BrowseMediaResponse {
  repeated MediaSummary results = 1;
  int32 page = 2;
  int32 total_pages = 3;
}

message GetPersonDetailRequest {
  int32 person_id = 1;
}

message GetPersonDetailResponse {
  PersonDetail detail = 1;
}

message GetStreamsRequest {
  int32 tmdb_id = 1;
  MediaType media_type = 2;
  int32 season = 3;
  int32 episode = 4;
}

message GetStreamsResponse {
  repeated StreamSource streams = 1;
}

message SearchSubtitlesRequest {
  int32 tmdb_id = 1;
  MediaType media_type = 2;
  int32 season = 3;
  int32 episode = 4;
}

message SearchSubtitlesResponse {
  repeated SubtitleTrack tracks = 1;
}

message DownloadSubtitleRequest {
  string track_reference = 1;
}

message DownloadSubtitleResponse {
  string url = 1;
}

message AddToWatchlistRequest {
  WatchlistItem item = 1;
}

message AddToWatchlistResponse {}

message RemoveFromWatchlistRequest {
  string media_id = 1;
  MediaType media_type = 2;
}

message RemoveFromWatchlistResponse {}

message GetWatchlistRequest {
  WatchlistSort sort_by = 1;
  SortOrder order = 2;
  WatchlistFilter media_type_filter = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message GetWatchlistResponse {
  repeated WatchlistItem items = 1;
  int32 total_count = 2;
}

message IsInWatchlistRequest {
  string media_id = 1;
  MediaType media_type = 2;
}

message IsInWatchlistResponse {
  bool in_watchlist = 1;
}

message ClearWatchlistRequest {}
message ClearWatchlistResponse {}

service RelaxService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc AddTorrent(AddTorrentRequest) returns (AddTorrentResponse);
  rpc RemoveTorrent(RemoveTorrentRequest) returns (RemoveTorrentResponse);
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);
  rpc UpsertWatchProgress(UpsertWatchProgressRequest) returns (UpsertWatchProgressResponse);
  rpc GetWatchProgress(GetWatchProgressRequest) returns (GetWatchProgressResponse);
  rpc GetWatchHistory(GetWatchHistoryRequest) returns (GetWatchHistoryResponse);
  rpc DeleteWatchProgress(DeleteWatchProgressRequest) returns (DeleteWatchProgressResponse);
  rpc ClearWatchHistory(ClearWatchHistoryRequest) returns (ClearWatchHistoryResponse);
  rpc StreamTorrentProgress(StreamTorrentProgressRequest) returns (stream TorrentProgressUpdate);
  rpc GetHomeSections(GetHomeSectionsRequest) returns (GetHomeSectionsResponse);
  rpc SearchMedia(SearchMediaRequest) returns (SearchMediaResponse);
  rpc GetMediaDetail(GetMediaDetailRequest) returns (GetMediaDetailResponse);
  rpc BrowseMedia(BrowseMediaRequest) returns (BrowseMediaResponse);
  rpc GetPersonDetail(GetPersonDetailRequest) returns (GetPersonDetailResponse);
  rpc GetStreams(GetStreamsRequest) returns (GetStreamsResponse);
  rpc SearchSubtitles(SearchSubtitlesRequest) returns (SearchSubtitlesResponse);
  rpc DownloadSubtitle(DownloadSubtitleRequest) returns (DownloadSubtitleResponse);
  rpc AddToWatchlist(AddToWatchlistRequest) returns (AddToWatchlistResponse);
  rpc RemoveFromWatchlist(RemoveFromWatchlistRequest) returns (RemoveFromWatchlistResponse);
  rpc GetWatchlist(GetWatchlistRequest) returns (GetWatchlistResponse);
  rpc IsInWatchlist(IsInWatchlistRequest) returns (IsInWatchlistResponse);
  rpc ClearWatchlist(ClearWatchlistRequest) returns (ClearWatchlistResponse);
}
